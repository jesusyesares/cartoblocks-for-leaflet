name: Update WordPress.org assets
# Pushes .wordpress-org/ assets (banners, icons, screenshots, blueprints)
# and readme.txt to WordPress.org SVN without cutting a release.
on:
  workflow_dispatch:
jobs:
  assets:
    name: Sync assets to SVN
    runs-on: ubuntu-latest
    environment: WordPress.org SVN
    steps:
    - uses: actions/checkout@v4
    - name: WordPress.org asset/readme update
      uses: 10up/action-wordpress-plugin-asset-update@stable
      env:
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        IGNORE_OTHER_FILES: true
